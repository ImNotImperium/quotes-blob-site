<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cloud File Converter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f2eee8;
      --card: #fffef8;
      --ink: #22201e;
      --muted: #6e6458;
      --accent: #0f766e;
      --accent-2: #ca8a04;
      --danger: #b91c1c;
      --border: #d6d0c7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Archivo", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 15%, #fff8e6 0%, transparent 35%),
        radial-gradient(circle at 80% 80%, #dbf7f3 0%, transparent 30%),
        var(--bg);
      min-height: 100vh;
    }

    #root {
      width: min(920px, 100% - 2rem);
      margin: 2rem auto;
      animation: rise 500ms ease-out;
    }

    .panel {
      background: linear-gradient(170deg, #fffef8, #f8f4ec);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(34, 32, 30, 0.12);
      padding: 1.5rem;
    }

    .title {
      margin: 0;
      font-size: clamp(1.8rem, 4.5vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 0.4rem;
      color: var(--muted);
      line-height: 1.4;
      max-width: 62ch;
    }

    .dropzone {
      margin-top: 1.25rem;
      border: 2px dashed var(--accent);
      border-radius: 14px;
      padding: 1.2rem;
      background: rgba(15, 118, 110, 0.08);
      transition: transform 180ms ease, background 180ms ease;
    }

    .dropzone:hover {
      transform: translateY(-1px);
      background: rgba(15, 118, 110, 0.14);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 0.65rem 1.1rem;
      font: 700 0.94rem "Space Mono", monospace;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: transform 150ms ease, opacity 150ms ease;
    }

    button.secondary {
      background: var(--accent-2);
      color: #2c2203;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .meta {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status {
      margin-top: 1rem;
      font-family: "Space Mono", monospace;
      font-size: 0.88rem;
      color: var(--ink);
    }

    .status.error { color: var(--danger); }

    a.download {
      display: inline-block;
      margin-top: 0.5rem;
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      border-bottom: 2px solid currentColor;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      #root { width: calc(100% - 1.2rem); margin: 1rem auto; }
      .panel { padding: 1rem; border-radius: 14px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script type="module" src="app.js?v=2"></script>
</body>
</html>
