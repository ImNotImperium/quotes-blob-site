name: CI and Deploy Cloud Converter

on:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - "site/**"
      - "infra/**"
      - ".github/workflows/deploy-converter.yml"
  pull_request:
    paths:
      - "api/**"
      - "site/**"
      - "infra/**"

jobs:
  api-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "api/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test

  deploy-api:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: api-build-test
    env:
      HAS_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: api
        run: npm ci
      - name: Build
        working-directory: api
        run: npm run build
      - name: Prune dev dependencies before deploy
        if: env.HAS_PUBLISH_PROFILE == 'true'
        working-directory: api
        run: npm prune --production
      - name: Deploy Azure Functions app
        if: env.HAS_PUBLISH_PROFILE == 'true'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME || 'quotesappra1064-cweubscvg5gmhne7' }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true

  deploy-site:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: api-build-test
    env:
      HAS_STORAGE: ${{ secrets.AZURE_STORAGE_ACCOUNT != '' && secrets.AZURE_STORAGE_SAS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Upload static site to Azure Blob $web
        if: env.HAS_STORAGE == 'true'
        uses: azure/CLI@v2
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
        with:
          inlineScript: |
            set -euo pipefail
            # Strip leading ? from SAS token if present
            CLEAN_SAS="${SAS_TOKEN#\?}"
            az storage blob upload-batch \
              --account-name "$STORAGE_ACCOUNT" \
              --sas-token "$CLEAN_SAS" \
              --destination '$web' \
              --source site \
              --overwrite true \
              --output table
