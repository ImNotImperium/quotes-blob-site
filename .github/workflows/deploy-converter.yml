name: CI and Deploy Cloud Converter

on:
  push:
    branches: ["main"]
    paths:
      - "api/**"
      - "site/**"
      - "infra/**"
      - ".github/workflows/deploy-converter.yml"
  pull_request:
    paths:
      - "api/**"
      - "site/**"
      - "infra/**"

jobs:
  api-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "api/package-lock.json"
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test

  deploy-api:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: api-build-test
    env:
      HAS_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        working-directory: api
        run: npm ci
      - name: Build
        working-directory: api
        run: npm run build
      - name: Prune dev dependencies before deploy
        if: env.HAS_PUBLISH_PROFILE == 'true'
        working-directory: api
        run: npm prune --production
      - name: Deploy Azure Functions app
        if: env.HAS_PUBLISH_PROFILE == 'true'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME || 'quotesappra1064-cweubscvg5gmhne7' }}
          package: api
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-funcignore: true
          scm-do-build-during-deployment: false

  deploy-site:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: api-build-test
    env:
      HAS_STORAGE: ${{ secrets.AZURE_STORAGE_ACCOUNT != '' && secrets.AZURE_STORAGE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Create public site container if missing
        if: env.HAS_STORAGE == 'true'
        run: |
          az storage container create \
            --name site \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" \
            --public-access blob 2>/dev/null || true
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
      - name: Upload static site to blob container
        if: env.HAS_STORAGE == 'true'
        run: |
          set -euo pipefail
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" \
            --destination site \
            --source site \
            --overwrite true \
            --output table
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
