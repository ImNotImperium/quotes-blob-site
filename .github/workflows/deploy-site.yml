name: Deploy site to Azure Blob Static Website

on:
  push:
    branches: [ "main" ]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_STORAGE: ${{ secrets.AZURE_STORAGE_ACCOUNT != '' && secrets.AZURE_STORAGE_SAS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Ensure $web container exists
        if: env.HAS_STORAGE == 'true'
        run: |
          CLEAN_SAS="${SAS_TOKEN#?}"
          az storage container create \
            --name '$web' \
            --account-name "$STORAGE_ACCOUNT" \
            --sas-token "$CLEAN_SAS" \
            --public-access blob 2>/dev/null || true
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
      - name: Upload to $web
        if: env.HAS_STORAGE == 'true'
        run: |
          set -euo pipefail
          CLEAN_SAS="${SAS_TOKEN#?}"
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --sas-token "$CLEAN_SAS" \
            --destination '$web' \
            --source site \
            --overwrite true \
            --output table
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
 