name: Deploy site to Azure Blob Static Website

on:
  push:
    branches: [ "main" ]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_STORAGE: ${{ secrets.AZURE_STORAGE_ACCOUNT != '' && secrets.AZURE_STORAGE_SAS_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      # Upload everything in /site to the $web container
      - name: Upload to $web
        if: env.HAS_STORAGE == 'true'
        uses: azure/CLI@v2
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          SAS_TOKEN: ${{ secrets.AZURE_STORAGE_SAS_TOKEN }}
        with:
          inlineScript: |
            set -euo pipefail
            # Strip leading ? from SAS token if present
            CLEAN_SAS="${SAS_TOKEN#\?}"
            az storage blob upload-batch \
              --account-name "$STORAGE_ACCOUNT" \
              --sas-token "$CLEAN_SAS" \
              --destination '$web' \
              --source site \
              --overwrite true \
              --output table
 