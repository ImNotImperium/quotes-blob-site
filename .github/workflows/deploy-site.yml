name: Deploy site

on:
  push:
    branches: [ "main" ]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_STORAGE: ${{ secrets.AZURE_STORAGE_ACCOUNT != '' && secrets.AZURE_STORAGE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync site/ to docs/ for GitHub Pages
        run: |
          rsync -av --delete site/ docs/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: sync docs from site [skip ci]"
          git push
      - name: Create site container if missing
        if: env.HAS_STORAGE == 'true'
        run: |
          az storage container create \
            --name site \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" && echo "Container ready" || echo "Container already exists or creation skipped"
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
      - name: Upload to site container
        if: env.HAS_STORAGE == 'true'
        run: |
          set -euo pipefail
          echo "Uploading from: $GITHUB_WORKSPACE/site"
          ls "$GITHUB_WORKSPACE/site"
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" \
            --destination site \
            --source "$GITHUB_WORKSPACE/site" \
            --overwrite true \
            --output table
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
 