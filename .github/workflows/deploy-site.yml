name: Deploy site to Azure Blob Static Website

on:
  push:
    branches: [ "main" ]
    paths:
      - "site/**"
      - ".github/workflows/deploy-site.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_STORAGE: ${{ secrets.AZURE_STORAGE_ACCOUNT != '' && secrets.AZURE_STORAGE_KEY != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Create public site container if missing
        if: env.HAS_STORAGE == 'true'
        run: |
          az storage container create \
            --name site \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" \
            --public-access blob 2>/dev/null || true
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
      - name: Upload to site container
        if: env.HAS_STORAGE == 'true'
        run: |
          set -euo pipefail
          az storage blob upload-batch \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" \
            --destination site \
            --source site \
            --overwrite true \
            --output table
        env:
          STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
          STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
 